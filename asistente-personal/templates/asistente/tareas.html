{% extends 'asistente/base.html' %}
{% block title %}Tareas - Asistente{% endblock %}
{% block content %}
<style>
    body { background: linear-gradient(135deg, #020617, #08111f 48%, #030712); color: #e5e7eb; }
    nav { background: rgba(2, 6, 23, 0.84) !important; border-color: rgba(148, 163, 184, 0.12) !important; }
    .page { width: min(1040px, calc(100vw - 32px)); margin: 0 auto; text-align: left; }
    .card { background: rgba(15,23,42,.78); border: 1px solid rgba(148,163,184,.13); border-radius: 18px; box-shadow: 0 18px 45px rgba(0,0,0,.24); }
    .muted { color: #94a3b8; }
    .input { background: rgba(2,6,23,.72); color: #f8fafc; border: 1px solid rgba(148,163,184,.18); border-radius: 12px; }
    .btn { border-radius: 12px; background: linear-gradient(135deg,#2563eb,#0f766e); color: white; font-weight: 700; }
    .task { background: rgba(30,41,59,.78); border: 1px solid rgba(255,255,255,.06); border-radius: 14px; padding: 14px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.72); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
    .modal.active { display: flex; }
    pre { white-space: pre-wrap; word-break: break-word; background: #020617; border: 1px solid rgba(148,163,184,.15); border-radius: 12px; padding: 14px; max-height: 60vh; overflow: auto; }

    @media (max-width: 768px) {
        .page {
            width: min(100%, calc(100vw - 20px));
        }

        .card {
            padding: 16px;
            border-radius: 16px;
        }

        h1 {
            font-size: clamp(22px, 5vw, 28px);
        }

        .flex.items-end.gap-4 {
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
        }

        .modal {
            padding: 16px;
        }
    }

    @media (max-width: 560px) {
        .page {
            width: min(100%, calc(100vw - 16px));
        }

        .card {
            padding: 14px;
        }

        .flex.gap-3 {
            flex-direction: column;
            gap: 10px;
        }

        .flex.gap-3 .btn {
            width: 100%;
        }

        .task {
            padding: 12px;
        }

        h1 {
            font-size: clamp(20px, 6vw, 26px);
        }
    }

    @media (max-width: 400px) {
        .page {
            width: min(100%, calc(100vw - 12px));
        }

        .card {
            padding: 12px;
        }

        .input, .btn {
            padding: 10px 12px;
            font-size: 13px;
        }

        .task {
            padding: 10px;
        }

        pre {
            padding: 12px;
            font-size: 12px;
        }

        h2 {
            font-size: 16px;
        }
    }
</style>

<div class="page">
    <div class="mb-5 flex items-end justify-between gap-4">
        <div>
            <p class="muted text-sm">Alarmas, recordatorios y tareas programadas</p>
            <h1 class="text-3xl font-bold text-white">Historial de tareas</h1>
        </div>
        <a href="/chat/" class="px-4 py-2 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold">Ir al chat</a>
    </div>

    <section class="card p-5">
        <div class="flex items-center gap-3 mb-4">
            <h2 class="text-lg font-bold text-white">Tareas recientes</h2>
            <span id="badge-tareas" class="ml-auto text-xs px-2 py-1 rounded-full bg-slate-500/30 text-slate-400">0</span>
        </div>
        <div id="lista-tareas" class="space-y-3">
            <p class="py-4 muted">Cargando tareas...</p>
        </div>
    </section>
</div>

<div id="task-modal" class="modal">
    <div class="card p-5 w-full max-w-4xl">
        <div class="flex items-center justify-between gap-4 mb-4">
            <h2 id="modal-title" class="text-xl font-bold text-white">Resultado</h2>
            <button onclick="cerrarResultado()" class="px-3 py-2 rounded-xl bg-slate-800 hover:bg-slate-700">Cerrar</button>
        </div>
        <pre id="modal-output"></pre>
    </div>
</div>

<script>
async function cargarTareas() {
    try {
        const res = await fetch('/api/tareas/');
        const data = await res.json();
        renderizarTareas(data.tareas || []);
    } catch(e) {
        document.getElementById('lista-tareas').innerHTML = '<p class="py-4 text-red-300">No se pudieron cargar las tareas.</p>';
    }
}

function renderizarTareas(tareas) {
    const lista = document.getElementById('lista-tareas');
    const badge = document.getElementById('badge-tareas');
    const activas = tareas.filter(t => t.estado === 'pendiente' || t.estado === 'ejecutando').length;
    badge.textContent = activas;
    badge.className = activas > 0
        ? 'ml-auto text-xs px-2 py-1 rounded-full bg-amber-500/30 text-amber-300'
        : 'ml-auto text-xs px-2 py-1 rounded-full bg-slate-500/30 text-slate-400';

    if (tareas.length === 0) {
        lista.innerHTML = '<p class="py-4 muted">No hay alarmas ni recordatorios programados.</p>';
        return;
    }

    lista.innerHTML = tareas.map(t => {
        const color = t.estado === 'completada' ? 'text-green-300 bg-green-500/10 border-green-500/20'
            : t.estado === 'error' ? 'text-red-300 bg-red-500/10 border-red-500/20'
            : 'text-amber-300 bg-amber-500/10 border-amber-500/20';
        return `
            <article class="task">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-xs px-2 py-0.5 rounded-full border ${color}">${escapeHtml(t.estado)}</span>
                    <span class="text-xs muted ml-auto">${escapeHtml(t.iniciado_en || t.creado_en || '')}</span>
                </div>
                <h3 class="font-semibold text-white">${escapeHtml(t.titulo)}</h3>
                <p class="text-xs text-cyan-300 font-mono truncate mt-1">${escapeHtml(t.comando)}</p>
                <button onclick="abrirResultadoTarea('${t.id}')" class="mt-3 text-sm text-blue-400 hover:text-blue-300">Ver resultado</button>
            </article>`;
    }).join('');
}

async function abrirResultadoTarea(id) {
    const res = await fetch(`/api/tareas/${id}/`);
    const data = await res.json();
    const tarea = data.tarea;
    document.getElementById('modal-title').textContent = tarea.titulo || `Tarea ${id}`;
    document.getElementById('modal-output').textContent = tarea.resultado || tarea.error || 'Aun sin salida.';
    document.getElementById('task-modal').classList.add('active');
}

function cerrarResultado() {
    document.getElementById('task-modal').classList.remove('active');
}

function escapeHtml(texto) {
    return String(texto || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

cargarTareas();
setInterval(cargarTareas, 1500);
</script>
{% endblock %}
