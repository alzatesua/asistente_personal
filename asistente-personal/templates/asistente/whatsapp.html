{% extends 'asistente/base.html' %}
{% block title %}WhatsApp - Asistente{% endblock %}
{% block content %}
<style>
    body { background: linear-gradient(135deg, #020617, #08111f 48%, #030712); color: #e5e7eb; }
    nav { background: rgba(2, 6, 23, 0.84) !important; border-color: rgba(148, 163, 184, 0.12) !important; }
    .page { width: min(1040px, calc(100vw - 32px)); margin: 0 auto; text-align: left; }
    .grid { display: grid; grid-template-columns: minmax(0, .8fr) minmax(0, 1.2fr); gap: 16px; }
    .card { background: rgba(15,23,42,.78); border: 1px solid rgba(148,163,184,.13); border-radius: 18px; box-shadow: 0 18px 45px rgba(0,0,0,.24); }
    .muted { color: #94a3b8; }
    .line-panel { border: 1px solid rgba(148,163,184,.14); background: rgba(15,23,42,.72); border-radius: 14px; padding: 14px; }
    .line-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .line-title { font-size: 16px; font-weight: 700; color: #f8fafc; }
    .icon-trash { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid rgba(248,113,113,.32); background: rgba(127,29,29,.2); color: #fecaca; font-size: 15px; transition: background .12s ease, border-color .12s ease, transform .12s ease; }
    .icon-trash:hover { background: rgba(185,28,28,.38); border-color: rgba(248,113,113,.55); transform: translateY(-1px); }
    .icon-trash:disabled { opacity: .7; cursor: wait; transform: none; }
    .line-section { border-top: 1px solid rgba(148,163,184,.12); padding-top: 12px; margin-top: 12px; }
    .line-section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #64748b; margin-bottom: 8px; }
    .control-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .read-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .action-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .secondary-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 8px; }
    .btn-line { min-height: 38px; border-radius: 10px; padding: 8px 10px; font-size: 13px; font-weight: 650; transition: transform .12s ease, background .12s ease, border-color .12s ease; border: 1px solid transparent; }
    .btn-line:hover { transform: translateY(-1px); }
    .btn-line:disabled { opacity: .72; cursor: wait; transform: none; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 999px; display: inline-block; animation: spin .75s linear infinite; vertical-align: -2px; margin-right: 6px; }
    .line-loading { display: flex; align-items: center; gap: 8px; min-height: 34px; border: 1px solid rgba(250,204,21,.2); background: rgba(250,204,21,.08); color: #fde68a; border-radius: 10px; padding: 8px 10px; font-size: 12px; margin-bottom: 10px; }
    .line-loading.hidden { display: none !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary { background: #16a34a; color: #fff; }
    .btn-primary:hover { background: #22c55e; }
    .btn-neutral { background: rgba(51,65,85,.95); color: #e2e8f0; border-color: rgba(148,163,184,.12); }
    .btn-neutral:hover { background: rgba(71,85,105,.95); }
    .btn-warning { background: rgba(217,119,6,.95); color: #fff; }
    .btn-warning:hover { background: rgba(245,158,11,.95); }
    .btn-danger { background: rgba(185,28,28,.96); color: #fff; }
    .btn-danger:hover { background: rgba(220,38,38,.96); }
    .btn-muted { background: rgba(15,23,42,.9); color: #cbd5e1; border-color: rgba(148,163,184,.18); }
    .btn-muted:hover { background: rgba(30,41,59,.95); }
    .btn-toggle-on { background: rgba(22,163,74,.18); color: #86efac; border-color: rgba(34,197,94,.38); }
    .btn-toggle-on:hover { background: rgba(22,163,74,.28); }
    .btn-toggle-off { background: rgba(185,28,28,.16); color: #fca5a5; border-color: rgba(248,113,113,.3); }
    .btn-toggle-off:hover { background: rgba(185,28,28,.25); }
    .line-input { background: rgba(15,23,42,.95); border: 1px solid rgba(148,163,184,.2); border-radius: 10px; color: #fff; outline: none; }
    @media (max-width: 520px) { .control-grid, .read-grid, .action-grid, .secondary-actions { grid-template-columns: 1fr; } }
    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
</style>

<div class="page">
    <div class="mb-5">
        <p class="muted text-sm">Conexion y mensajes</p>
        <h1 class="text-3xl font-bold text-white">WhatsApp</h1>
    </div>

    <div class="grid">
        <section class="card p-5">
            <h2 class="font-bold text-white mb-4 flex items-center gap-2">
                Líneas WhatsApp
                <span id="wa-status-badge" class="ml-auto text-xs px-2 py-1 rounded-full bg-slate-500/30 text-slate-400">Checking...</span>
            </h2>
            <div class="flex gap-2 mb-4">
                <input id="nueva-linea" class="line-input flex-1 px-3 py-2 text-sm" placeholder="ventas, soporte, principal">
                <button onclick="agregarLinea()" class="px-3 py-2 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-500 transition">Agregar</button>
            </div>
            <button id="start-all" onclick="iniciarTodoWhatsApp()" class="w-full mb-3 py-2 rounded-lg text-sm font-semibold bg-green-600 hover:bg-green-500 transition">Iniciar todo</button>
            <button onclick="borrarMemoriaWhatsApp()" class="w-full mb-4 py-2 rounded-lg text-sm font-medium bg-red-600/80 hover:bg-red-500 transition">Borrar memoria WhatsApp</button>
            <div id="wa-lines" class="space-y-3"></div>
        </section>

        <section class="card p-5">
            <h2 class="font-bold text-white mb-4 flex items-center gap-2">
                Mensajes recientes
                <span id="badge-mensajes" class="ml-auto bg-blue-500 text-xs px-2 py-1 rounded-full hidden">0</span>
            </h2>
            <div id="lista-mensajes" class="space-y-2 text-sm muted">
                <p class="py-4">Cargando mensajes...</p>
            </div>
        </section>
    </div>
</div>

<script>
let lineas = JSON.parse(localStorage.getItem('wa_lineas') || '[]');
if (lineas.length === 1 && lineas[0] === 'principal' && !localStorage.getItem('wa_lineas_usuario')) {
    lineas = [];
    localStorage.setItem('wa_lineas', JSON.stringify(lineas));
}
const lineStatus = {};
const lineConfig = {};
const connectingLines = new Set();
let loadingSessions = false;

function guardarLineas() {
    localStorage.setItem('wa_lineas_usuario', '1');
    localStorage.setItem('wa_lineas', JSON.stringify(lineas));
}

function agregarLinea() {
    const input = document.getElementById('nueva-linea');
    const id = normalizarLinea(input.value);
    if (!id || lineas.includes(id)) return;
    lineas.push(id);
    guardarLineas();
    input.value = '';
    renderLineas();
    checkWhatsAppStatus();
    cargarConfigLineas();
}

function fusionarLineas(nuevasLineas) {
    const combinadas = [...lineas];
    for (const linea of nuevasLineas || []) {
        const id = normalizarLinea(linea);
        if (id && !combinadas.includes(id)) combinadas.push(id);
    }
    lineas = combinadas.sort();
    guardarLineas();
}

async function cargarSesionesGuardadas() {
    if (loadingSessions) return;
    loadingSessions = true;
    try {
        const res = await fetch('/api/whatsapp/sesiones/');
        const data = await res.json();
        fusionarLineas(data.lineas || []);
        for (const sesion of data.sesiones || []) {
            const linea = normalizarLinea(sesion.linea);
            if (!linea) continue;
            if (sesion.config) lineConfig[linea] = sesion.config;
            if (sesion.estado) lineStatus[linea] = sesion.estado;
        }
        renderLineas();
        actualizarBotonesConfig();
        for (const [linea, estado] of Object.entries(lineStatus)) {
            updateWAStatus(linea, estado);
        }
    } catch(e) {
        console.warn('No pude cargar sesiones guardadas', e);
    } finally {
        loadingSessions = false;
    }
}

function normalizarLinea(texto) {
    return String(texto || '').trim().toLowerCase().replace(/[^a-z0-9_-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

function quitarLinea(linea) {
    lineas = lineas.filter(item => item !== linea);
    guardarLineas();
    renderLineas();
    cargarConfigLineas();
}

function renderLineas() {
    const contenedor = document.getElementById('wa-lines');
    if (lineas.length === 0) {
        contenedor.innerHTML = '<div class="line-panel text-sm muted">Agregue una línea para conectarla a WhatsApp.</div>';
        return;
    }
    contenedor.innerHTML = lineas.map(linea => `
        <div class="line-panel" id="line-${escapeHtml(linea)}">
            <div class="line-head">
                <span class="line-title">${escapeHtml(linea)}</span>
                <span id="badge-${escapeHtml(linea)}" class="ml-auto text-xs px-2 py-1 rounded-full bg-slate-500/30 text-slate-400">Checking...</span>
                <button id="delete-${escapeHtml(linea)}" onclick="eliminarLineaDefinitiva('${escapeHtml(linea)}')" class="icon-trash" title="Eliminar definitivamente" aria-label="Eliminar definitivamente ${escapeHtml(linea)}">&#128465;</button>
            </div>
            <p id="phone-${escapeHtml(linea)}" class="text-xs muted mb-3"></p>
            <div id="loading-${escapeHtml(linea)}" class="line-loading hidden">
                <span class="spinner"></span>
                <span id="loading-text-${escapeHtml(linea)}">Preparando conexión...</span>
            </div>
            <div class="line-section">
                <div class="line-section-label">Respuestas automáticas</div>
                <div class="control-grid">
                    <button id="cfg-chats-${escapeHtml(linea)}" onclick="toggleRespuestaLinea('${escapeHtml(linea)}', 'chats')" class="btn-line btn-muted">Chats</button>
                    <button id="cfg-grupos-${escapeHtml(linea)}" onclick="toggleRespuestaLinea('${escapeHtml(linea)}', 'grupos')" class="btn-line btn-muted">Grupos</button>
                    <button id="cfg-todo-${escapeHtml(linea)}" onclick="toggleRespuestaLinea('${escapeHtml(linea)}', 'todo')" class="btn-line btn-muted">Todo</button>
                </div>
            </div>
            <div class="line-section">
                <div class="line-section-label">Lectura en voz alta</div>
                <div class="read-grid">
                    <button id="read-chats-${escapeHtml(linea)}" onclick="toggleLecturaLinea('${escapeHtml(linea)}', 'chats')" class="btn-line btn-muted">Leer chats</button>
                    <button id="read-grupos-${escapeHtml(linea)}" onclick="toggleLecturaLinea('${escapeHtml(linea)}', 'grupos')" class="btn-line btn-muted">Leer grupos</button>
                </div>
            </div>
            <div class="line-section">
                <div class="line-section-label">Respuestas por voz</div>
                <button id="voice-reply-${escapeHtml(linea)}" onclick="toggleRespuestaVozLinea('${escapeHtml(linea)}')" class="btn-line btn-muted w-full">Responder con voz</button>
            </div>
            <div id="qr-${escapeHtml(linea)}" class="hidden mb-3">
                <p id="qr-counter-${escapeHtml(linea)}" class="text-xs text-yellow-400 mb-2">QR activo</p>
                <div class="bg-white p-3 rounded-xl w-fit">
                    <img id="qr-img-${escapeHtml(linea)}" src="" alt="QR WhatsApp ${escapeHtml(linea)}" class="w-44 h-44">
                </div>
            </div>
            <div class="line-section">
                <div class="line-section-label">Conexión</div>
                <div class="action-grid">
                    <button id="connect-${escapeHtml(linea)}" onclick="conectarWhatsApp('${escapeHtml(linea)}')" class="btn-line btn-primary">Conectar</button>
                    <button onclick="desconectarWhatsApp('${escapeHtml(linea)}')" class="btn-line btn-neutral">Desconectar</button>
                </div>
                <div class="secondary-actions">
                    <button onclick="borrarMemoriaWhatsApp('${escapeHtml(linea)}')" class="btn-line btn-warning">Borrar memoria</button>
                    <button onclick="quitarLinea('${escapeHtml(linea)}')" class="btn-line btn-muted">Quitar línea</button>
                </div>
            </div>
            <div class="line-section">
                <button onclick="borrarSesionWhatsApp('${escapeHtml(linea)}')" class="btn-line btn-danger w-full">Borrar sesión del teléfono</button>
            </div>
        </div>
    `).join('');
    actualizarBotonesConfig();
}

async function cargarConfigLineas() {
    if (lineas.length === 0) return;
    try {
        const res = await fetch(`/api/whatsapp/config-lineas/?lineas=${encodeURIComponent(lineas.join(','))}`);
        const data = await res.json();
        Object.assign(lineConfig, data.lineas || {});
        actualizarBotonesConfig();
    } catch(e) {}
}

function actualizarBotonesConfig() {
    for (const linea of lineas) {
        const config = lineConfig[linea] || {responder_chats: true, responder_grupos: true, leer_chats: true, leer_grupos: true, responder_voz: false};
        const chatsBtn = document.getElementById(`cfg-chats-${linea}`);
        const gruposBtn = document.getElementById(`cfg-grupos-${linea}`);
        const todoBtn = document.getElementById(`cfg-todo-${linea}`);
        const readChatsBtn = document.getElementById(`read-chats-${linea}`);
        const readGruposBtn = document.getElementById(`read-grupos-${linea}`);
        const voiceReplyBtn = document.getElementById(`voice-reply-${linea}`);
        if (!chatsBtn || !gruposBtn || !todoBtn || !readChatsBtn || !readGruposBtn || !voiceReplyBtn) continue;

        chatsBtn.textContent = config.responder_chats ? 'Chats ON' : 'Chats OFF';
        chatsBtn.className = config.responder_chats
            ? 'btn-line btn-toggle-on'
            : 'btn-line btn-toggle-off';

        gruposBtn.textContent = config.responder_grupos ? 'Grupos ON' : 'Grupos OFF';
        gruposBtn.className = config.responder_grupos
            ? 'btn-line btn-toggle-on'
            : 'btn-line btn-toggle-off';

        const todoActivo = config.responder_chats || config.responder_grupos;
        todoBtn.textContent = todoActivo ? 'Apagar todo' : 'Activar todo';
        todoBtn.className = todoActivo
            ? 'btn-line btn-warning'
            : 'btn-line btn-primary';

        readChatsBtn.textContent = config.leer_chats ? 'Leer chats ON' : 'Leer chats OFF';
        readChatsBtn.className = config.leer_chats
            ? 'btn-line btn-toggle-on'
            : 'btn-line btn-toggle-off';

        readGruposBtn.textContent = config.leer_grupos ? 'Leer grupos ON' : 'Leer grupos OFF';
        readGruposBtn.className = config.leer_grupos
            ? 'btn-line btn-toggle-on'
            : 'btn-line btn-toggle-off';

        voiceReplyBtn.textContent = config.responder_voz ? 'Responder con voz ON' : 'Responder con voz OFF';
        voiceReplyBtn.className = config.responder_voz
            ? 'btn-line btn-toggle-on w-full'
            : 'btn-line btn-toggle-off w-full';
    }
}

async function guardarConfigLinea(linea, payload) {
    const res = await fetch('/api/whatsapp/config-lineas/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({linea, ...payload})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'No se pudo guardar la configuración');
    lineConfig[linea] = data.config;
    actualizarBotonesConfig();
}

async function toggleRespuestaLinea(linea, modo) {
    const config = lineConfig[linea] || {responder_chats: true, responder_grupos: true, leer_chats: true, leer_grupos: true, responder_voz: false};
    try {
        if (modo === 'chats') {
            await guardarConfigLinea(linea, {responder_chats: !config.responder_chats});
        } else if (modo === 'grupos') {
            await guardarConfigLinea(linea, {responder_grupos: !config.responder_grupos});
        } else {
            const todoActivo = config.responder_chats || config.responder_grupos;
            await guardarConfigLinea(linea, todoActivo ? {desactivar_todo: true} : {activar_todo: true});
        }
    } catch(e) {
        alert(`Error guardando configuración: ${e.message}`);
    }
}

async function toggleLecturaLinea(linea, modo) {
    const config = lineConfig[linea] || {responder_chats: true, responder_grupos: true, leer_chats: true, leer_grupos: true, responder_voz: false};
    try {
        if (modo === 'chats') {
            await guardarConfigLinea(linea, {leer_chats: !config.leer_chats});
        } else {
            await guardarConfigLinea(linea, {leer_grupos: !config.leer_grupos});
        }
    } catch(e) {
        alert(`Error guardando lectura: ${e.message}`);
    }
}

async function toggleRespuestaVozLinea(linea) {
    const config = lineConfig[linea] || {responder_chats: true, responder_grupos: true, leer_chats: true, leer_grupos: true, responder_voz: false};
    try {
        await guardarConfigLinea(linea, {responder_voz: !config.responder_voz});
    } catch(e) {
        alert(`Error guardando respuesta por voz: ${e.message}`);
    }
}

async function cargarMensajes() {
    try {
        const res = await fetch('/api/mensajes/');
        const data = await res.json();
        const lista = document.getElementById('lista-mensajes');
        const badge = document.getElementById('badge-mensajes');
        if (data.mensajes.length === 0) {
            lista.innerHTML = '<p class="py-4 muted">Sin mensajes nuevos</p>';
            badge.classList.add('hidden');
        } else {
            badge.textContent = data.mensajes.length;
            badge.classList.remove('hidden');
            lista.innerHTML = data.mensajes.map(m => `
                <div class="bg-slate-800/80 rounded-xl p-3">
                    <div class="flex justify-between gap-3 mb-1">
                        <span class="font-medium text-white">${escapeHtml(m.contacto || m.numero)}</span>
                        <span class="text-xs muted">${m.tipo === 'voz' ? 'Voz' : 'Texto'}</span>
                    </div>
                    <p class="muted truncate">${escapeHtml(m.contenido)}</p>
                    <p class="text-xs text-slate-600 mt-1">${escapeHtml(m.creado_en)}</p>
                </div>`).join('');
        }
    } catch(e) {}
}

async function checkWhatsAppStatus() {
    let conectadas = 0;
    if (lineas.length === 0) {
        const badge = document.getElementById('wa-status-badge');
        badge.textContent = '0/0 conectadas';
        badge.className = 'ml-auto text-xs px-2 py-1 rounded-full bg-slate-500/30 text-slate-400';
        return;
    }
    for (const linea of lineas) {
        try {
            const res = await fetch(`/api/whatsapp/estado-linea/${encodeURIComponent(linea)}/`);
            const data = await res.json();
            lineStatus[linea] = data;
            updateWAStatus(linea, data);
            if (data.status === 'connected') conectadas++;
        } catch(e) {
            updateWAStatus(linea, {status: 'offline', hasQR: false});
        }
    }
    const badge = document.getElementById('wa-status-badge');
    badge.textContent = `${conectadas}/${lineas.length} conectadas`;
    badge.className = conectadas ? 'ml-auto text-xs px-2 py-1 rounded-full bg-green-500/30 text-green-300' : 'ml-auto text-xs px-2 py-1 rounded-full bg-red-500/30 text-red-300';
}

function updateWAStatus(linea, data) {
    const badge = document.getElementById(`badge-${linea}`);
    const qrContainer = document.getElementById(`qr-${linea}`);
    const qrCounter = document.getElementById(`qr-counter-${linea}`);
    const phone = document.getElementById(`phone-${linea}`);
    const loading = document.getElementById(`loading-${linea}`);
    const loadingText = document.getElementById(`loading-text-${linea}`);
    const connectBtn = document.getElementById(`connect-${linea}`);
    if (!badge || !qrContainer) return;
    qrContainer.classList.add('hidden');
    phone.textContent = data.phoneNumber ? `Numero conectado: ${data.phoneNumber}` : '';
    const ocultarLoading = () => {
        if (!loading) return;
        loading.classList.add('hidden');
        loading.style.display = 'none';
    };
    const mostrarLoading = () => {
        if (!loading) return;
        loading.classList.remove('hidden');
        loading.style.display = 'flex';
    };

    if (data.status === 'connected') {
        connectingLines.delete(linea);
        badge.textContent = 'Conectado';
        badge.className = 'ml-auto text-xs px-2 py-1 rounded-full bg-green-500/30 text-green-300';
        ocultarLoading();
        if (connectBtn) {
            connectBtn.disabled = false;
            connectBtn.innerHTML = 'Conectar';
        }
    } else if (data.hasQR) {
        connectingLines.delete(linea);
        const count = data.qrCount || 0;
        const max = data.maxQr || 20;
        badge.textContent = `QR ${count}/${max}`;
        badge.className = 'ml-auto text-xs px-2 py-1 rounded-full bg-yellow-500/30 text-yellow-300';
        ocultarLoading();
        if (connectBtn) {
            connectBtn.disabled = false;
            connectBtn.innerHTML = 'Conectar';
        }
        qrContainer.classList.remove('hidden');
        if (qrCounter) qrCounter.textContent = `QR activo. Intento ${count}/${max}`;
        loadQR(linea);
    } else if (data.status === 'connecting') {
        badge.textContent = 'Conectando';
        badge.className = 'ml-auto text-xs px-2 py-1 rounded-full bg-yellow-500/30 text-yellow-300';
        mostrarLoading();
        if (loadingText) loadingText.textContent = 'Generando QR, espere un momento...';
        if (connectBtn) {
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<span class="spinner"></span>Generando QR';
        }
    } else {
        connectingLines.delete(linea);
        badge.textContent = 'Offline';
        badge.className = 'ml-auto text-xs px-2 py-1 rounded-full bg-red-500/30 text-red-300';
        ocultarLoading();
        if (connectBtn) {
            connectBtn.disabled = false;
            connectBtn.innerHTML = 'Conectar';
        }
    }
}

async function loadQR(linea) {
    try {
        const res = await fetch(`/api/whatsapp/qr-linea/${encodeURIComponent(linea)}/`);
        const data = await res.json();
        if (data.qr) document.getElementById(`qr-img-${linea}`).src = data.qr;
    } catch(e) {}
}

async function conectarWhatsApp(linea = 'principal') {
    try {
        connectingLines.add(linea);
        updateWAStatus(linea, {status: 'connecting', hasQR: false});
        const res = await fetch('/api/whatsapp/conectar-linea/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({linea})
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || 'No se pudo iniciar Baileys');
        }
        const data = await res.json().catch(() => ({}));
        updateWAStatus(linea, data.status ? data : {status: 'connecting', hasQR: false});
        setTimeout(checkWhatsAppStatus, 1500);
    } catch(e) {
        connectingLines.delete(linea);
        updateWAStatus(linea, {status: 'offline', hasQR: false});
        alert(`Error al conectar: ${e.message}`);
    }
}

async function iniciarTodoWhatsApp() {
    if (lineas.length === 0) {
        await cargarSesionesGuardadas();
    }
    if (lineas.length === 0) {
        alert('No hay sesiones guardadas. Agregue una línea primero.');
        return;
    }

    const btn = document.getElementById('start-all');
    try {
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Iniciando todo';
        }
        for (const linea of lineas) {
            connectingLines.add(linea);
            updateWAStatus(linea, {status: 'connecting', hasQR: false});
        }
        const res = await fetch('/api/whatsapp/iniciar-todo/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({lineas})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'No se pudo iniciar todo');

        for (const item of data.resultados || []) {
            const linea = normalizarLinea(item.linea);
            if (!linea) continue;
            if (item.ok) {
                updateWAStatus(linea, item);
            } else {
                connectingLines.delete(linea);
                updateWAStatus(linea, {status: 'offline', hasQR: false});
                console.warn(`Error iniciando ${linea}:`, item.error);
            }
        }
        setTimeout(checkWhatsAppStatus, 1500);
    } catch(e) {
        alert(`Error iniciando todo: ${e.message}`);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = 'Iniciar todo';
        }
    }
}

async function desconectarWhatsApp(linea = 'principal') {
    try {
        connectingLines.delete(linea);
        await fetch(`/api/whatsapp/desconectar-linea/${encodeURIComponent(linea)}/`, {method: 'POST'});
        updateWAStatus(linea, {status: 'offline', hasQR: false});
    } catch(e) {
        alert('Error al desconectar la linea.');
    }
}

async function borrarMemoriaWhatsApp(linea = '') {
    const mensaje = linea
        ? `¿Borrar la memoria guardada de la linea "${linea}"?`
        : '¿Borrar toda la memoria guardada de WhatsApp?';
    if (!confirm(mensaje)) return;

    try {
        const res = await fetch('/api/whatsapp/borrar-memoria/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(linea ? {linea} : {todo: true})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo borrar la memoria');
        alert(`Memoria borrada: ${data.mensajes_eliminados} mensajes en ${data.conversaciones_eliminadas} conversaciones.`);
        cargarMensajes();
    } catch(e) {
        alert(`Error borrando memoria: ${e.message}`);
    }
}

async function borrarSesionWhatsApp(linea) {
    const confirmar = confirm(
        `¿Cerrar y borrar la sesión "${linea}"?\n\nEsto elimina las credenciales locales de Baileys. Para enlazarla otra vez tendrás que escanear un QR nuevo.`
    );
    if (!confirmar) return;

    try {
        const res = await fetch('/api/whatsapp/borrar-sesion/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({linea})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo borrar la sesión');

        updateWAStatus(linea, {status: 'offline', hasQR: false});
        alert('Sesión borrada. Si todavía aparece en WhatsApp, elimine el dispositivo vinculado desde el teléfono.');
        setTimeout(checkWhatsAppStatus, 1000);
    } catch(e) {
        alert(`Error borrando sesión: ${e.message}`);
    }
}

async function eliminarLineaDefinitiva(linea) {
    const confirmar = confirm(
        `¿Eliminar definitivamente la línea "${linea}"?\n\nSe borrará la sesión de Baileys, la configuración guardada y la memoria de esa línea. Esta acción no se puede deshacer.`
    );
    if (!confirmar) return;

    const btn = document.getElementById(`delete-${linea}`);
    try {
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
        }
        const res = await fetch('/api/whatsapp/eliminar-linea/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({linea})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.baileys_error || data.error || 'No se pudo eliminar la línea');

        lineas = lineas.filter(item => item !== linea);
        delete lineConfig[linea];
        delete lineStatus[linea];
        connectingLines.delete(linea);
        guardarLineas();
        renderLineas();
        checkWhatsAppStatus();
    } catch(e) {
        alert(`Error eliminando la línea: ${e.message}`);
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '&#128465;';
        }
    }
}

function escapeHtml(texto) {
    return String(texto || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

renderLineas();
cargarSesionesGuardadas().then(() => {
    cargarConfigLineas();
    checkWhatsAppStatus();
});
cargarMensajes();
setInterval(cargarMensajes, 10000);
setInterval(checkWhatsAppStatus, 5000);
</script>
